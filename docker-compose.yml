version: "3.8"

services:

  app:
    build: ./app

    container_name: node-app

    ports:
      - "3000:3000"

    env_file:
      - .env

    depends_on:
      - db

  db:
    image: postgres:16

    container_name: postgres-db

    restart: always

    env_file:
      - .env

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: